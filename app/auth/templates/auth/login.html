{% extends "base.html" %}
{% block title %}Log in &middot; Sparkle{% endblock %}
{% block content %}
<div class="card card-raised" style="max-width:420px;margin:40px auto">
  <h1>Welcome back &#128075;</h1>
  <p class="text-muted" style="margin-bottom:24px">Let's get you signed in.</p>
  <form method="POST" action="{{ url_for('auth.login') }}">
    <label class="field-label">Email</label>
    <input class="input" type="email" name="email" value="{{ email or '' }}" placeholder="you@example.com" required style="margin-bottom:16px">
    <label class="field-label">Password</label>
    <input class="input" type="password" name="password" placeholder="Your password" required style="margin-bottom:20px">
    <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Log in</button>
  </form>
  <p class="text-muted" style="margin-top:16px;font-size:14px">New here?
     <a href="{{ url_for('auth.register') }}">Create an account</a></p>
</div>
{% endblock %}
