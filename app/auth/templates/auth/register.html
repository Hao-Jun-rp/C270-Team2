{% extends "base.html" %}
{% block title %}Sign up &middot; Sparkle{% endblock %}
{% block content %}
<div class="card card-raised" style="max-width:420px;margin:40px auto">
  <h1>Create your account</h1>
  <p class="text-muted" style="margin-bottom:24px">It only takes a few seconds.</p>
  <form method="POST" action="{{ url_for('auth.register') }}">
    <label class="field-label">Name</label>
    <input class="input" type="text" name="name" value="{{ name or '' }}" placeholder="Your name" required style="margin-bottom:16px">
    <label class="field-label">Email</label>
    <input class="input" type="email" name="email" value="{{ email or '' }}" placeholder="you@example.com" required style="margin-bottom:16px">
    <label class="field-label">Password</label>
    <input class="input" type="password" name="password" placeholder="At least 6 characters" required style="margin-bottom:16px">
    <label class="field-label">Confirm password</label>
    <input class="input" type="password" name="confirm" placeholder="Type it again" required style="margin-bottom:20px">
    <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Sign up</button>
  </form>
  <p class="text-muted" style="margin-top:16px;font-size:14px">Already have an account?
     <a href="{{ url_for('auth.login') }}">Log in</a></p>
</div>
{% endblock %}
