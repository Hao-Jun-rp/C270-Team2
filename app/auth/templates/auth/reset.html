{% extends "base.html" %}
{% block title %}Reset password &middot; Sparkle{% endblock %}
{% block content %}
<div class="card card-raised" style="max-width:420px;margin:40px auto">
  <h1>Choose a new password</h1>
  <p class="text-muted" style="margin-bottom:24px">
    Resetting the password for <strong>{{ user.email }}</strong>.
  </p>

  <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
    <label class="field-label">New password</label>
    <input class="input" type="password" name="password" minlength="6"
           placeholder="At least 6 characters" required style="margin-bottom:16px">
    <label class="field-label">Confirm new password</label>
    <input class="input" type="password" name="confirm" minlength="6"
           placeholder="Type it again" required style="margin-bottom:20px">
    <button class="btn btn-primary" type="submit"
            style="width:100%;justify-content:center">Set new password</button>
  </form>

  <p class="text-muted" style="margin-top:16px;font-size:14px">
    <a href="{{ url_for('auth.login') }}">Back to log in</a></p>
</div>
{% endblock %}
