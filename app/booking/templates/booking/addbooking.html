{% extends "base.html" %}
{% block title %}New booking{% endblock %}
{% block content %}
<div class="container" style="padding-top:40px;padding-bottom:64px;max-width:640px">
  <div style="margin-bottom:28px">
    <span style="font-family:var(--font-head);font-weight:600;font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-primary)">Booking &amp; scheduling</span>
    <h1 style="margin-top:6px">Book a clean</h1>
    <p style="color:var(--color-slate);margin:4px 0 0">Pick a service and a time — we'll confirm shortly.</p>
  </div>
  <form method="POST" action="{{ url_for('booking.add_booking') }}" class="card card-raised" style="padding:28px;display:flex;flex-direction:column;gap:18px">
    <div>
      <label style="display:block;font-family:var(--font-head);font-weight:600;font-size:.8125rem;margin-bottom:6px">Service</label>
      <select class="input" name="service_id" required style="width:100%">
        <option value="">Choose a service…</option>
        {% for s in services %}
        <option value="{{ s.id }}" {% if form and form.service_id == s.id %}selected{% endif %}>{{ s.name }} — from ${{ s.price }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div style="flex:1;min-width:180px">
        <label style="display:block;font-family:var(--font-head);font-weight:600;font-size:.8125rem;margin-bottom:6px">Date</label>
        <input class="input" type="date" name="date" value="{{ form.date if form else '' }}" required style="width:100%">
      </div>
      <div style="flex:1;min-width:180px">
        <label style="display:block;font-family:var(--font-head);font-weight:600;font-size:.8125rem;margin-bottom:6px">Time slot</label>
        <select class="input" name="time" required style="width:100%">
          <option value="">Choose a time…</option>
          {% for slot in ["09:00–10:00","10:00–11:00","11:00–12:00","13:00–14:00","14:00–15:00","15:00–16:00","16:00–17:00"] %}
          <option value="{{ slot }}" {% if form and form.time == slot %}selected{% endif %}>{{ slot }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div>
      <label style="display:block;font-family:var(--font-head);font-weight:600;font-size:.8125rem;margin-bottom:6px">Address</label>
      <input class="input" type="text" name="address" value="{{ form.address if form else '' }}" placeholder="Where should we clean?" required style="width:100%">
    </div>
    <div>
      <label style="display:block;font-family:var(--font-head);font-weight:600;font-size:.8125rem;margin-bottom:6px">Notes <span class="text-muted" style="font-weight:400">(optional)</span></label>
      <textarea class="input" name="notes" rows="3" placeholder="Anything we should know? e.g. pets, eco products, gate code" style="width:100%;resize:vertical">{{ form.notes if form else '' }}</textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:6px">
      <a href="{{ url_for('listings.index') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary" style="flex:1">Request booking</button>
    </div>
  </form>
</div>
{% endblock %}
