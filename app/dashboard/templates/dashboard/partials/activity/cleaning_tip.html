<br>
<div class="card card-raised">

    <h2>Cleaning Tips</h2>

    <br>

    <h3 id="tip-title">
        {{ tips[0].title }}
    </h3>

    <p id="tip-message">
        {{ tips[0].message }}
    </p>

    <br>

    <div style="display:flex;justify-content:space-between;align-items:center;">

        <button
            class="btn btn-ghost"
            onclick="previousTip()">

            ← Previous

        </button>

        <small>

            <span id="tip-number">
                1
            </span>

            /

            {{ tips|length }}

        </small>

        <button
            class="btn btn-primary"
            onclick="nextTip()">

            Next →

        </button>

    </div>

</div>


<script>

const tips = {{ tips|tojson }};

let currentTip = 0;

function updateTip(){

    document.getElementById("tip-title").innerText =
        tips[currentTip].title;

    document.getElementById("tip-message").innerText =
        tips[currentTip].message;

    document.getElementById("tip-number").innerText =
        currentTip + 1;

}

function nextTip(){

    currentTip++;

    if(currentTip >= tips.length){

        currentTip = 0;

    }

    updateTip();

}

function previousTip(){

    currentTip--;

    if(currentTip < 0){

        currentTip = tips.length - 1;

    }

    updateTip();

}

</script>
