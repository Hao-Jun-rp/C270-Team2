<section style="margin-top:40px;margin-bottom:50px;">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    ">

        <h2>

            Recent Activity

        </h2>

        <a
        href="{{ url_for('notifications.index') }}"
        style="
            text-decoration:none;
            font-weight:600;
            color:var(--color-primary);
        ">

            View All →

        </a>

    </div>


    {% if activities %}

        {% for activity in activities %}

        <div
        class="card"
        style="margin-bottom:15px;">

            <div style="
                display:flex;
                justify-content:space-between;
                align-items:center;
            ">

                <div>

                    <h3 style="margin-bottom:6px;">

                        {{ activity.title }}

                    </h3>

                    <p class="text-muted">

                        {{ activity.description }}

                    </p>

                </div>

                <small class="text-muted">

                    {{ activity.time }}

                </small>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="card">

            <h3>

                No Recent Activity

            </h3>

            <p>

                Your recent booking updates,
                confirmations and reviews will
                appear here.

            </p>

        </div>

    {% endif %}

</section>
